<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Assets/skg.png">
    <title>Famewall Review</title>
</head>
<body>
    <!-- ── ANTI-COPY ── -->
<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    const kb = (e.ctrlKey || e.metaKey) && ['c','u','s','a','p','x'].includes(e.key.toLowerCase());
    const dt = e.key === 'F12' || ((e.ctrlKey || e.metaKey) && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()));
    if (kb || dt) e.preventDefault();
  });
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());
  (function devDetect() {
    const threshold = 160;
    setInterval(() => {
      if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
        document.body.innerHTML = '<div style="height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:0.85rem;color:#6b6560;">Please refresh the page to continue.</div>';
      }
    }, 1200);
  })();
</script>
<script type="text/javascript" src="https://page.famewall.io/iframeResizer.min.js"></script>
<iframe id="famewall-collection-embed" src="https://page.famewall.io/skill-kwa-ground-famewall?widget-embed=1" allow="camera;microphone" frameborder="0" scrolling="no" width="100%"></iframe>
<script type="text/javascript">iFrameResize({log: false, checkOrigin: false}, "#famewall-collection-embed");</script>
    
</body>
</html>
